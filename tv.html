<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI Ranking TV</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #07131f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #17324f;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #dfe9f4;
    }
    .bg,
    .bg-video {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-position: center center;
      background-size: cover;
      opacity: 1;
      object-fit: cover;
    }
    .shade {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,.08));
    }
    .title {
      position: absolute;
      top: 34px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 5;
      text-shadow: 0 2px 8px rgba(255,255,255,.75);
    }
    .title h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.2;
      font-weight: 800;
    }
    .title p {
      margin: 8px 0 0;
      font-size: 20px;
      font-weight: 600;
    }
    #path {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    .dept {
      position: absolute;
      z-index: 6;
      min-width: 156px;
      max-width: 300px;
      padding: 10px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.6);
      background: rgba(255,255,255,.25);
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      text-align: left;
      white-space: nowrap;
      transform: translate(-50%, -50%);
    }
    .climber {
      display: inline-block;
      width: 34px;
      height: 44px;
      margin-right: 10px;
      vertical-align: middle;
      color: inherit;
    }
    .climber img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .dept-name {
      display: inline-block;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      vertical-align: middle;
    }
    .dept-count {
      display: inline-block;
      margin-left: 8px;
      font-size: 18px;
      line-height: 1;
      font-weight: 800;
      vertical-align: middle;
    }
    .dept-unit {
      font-size: 14px;
      margin-left: 5px;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .module {
      position: absolute;
      z-index: 4;
      border-radius: 16px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 10px 40px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .module-title {
      height: 30px;
      line-height: 30px;
      padding: 0 10px;
      font-size: 16px;
      font-weight: 700;
      background: rgba(255,255,255,.55);
    }
    .module img,
    .module video {
      width: 100%;
      height: calc(100% - 30px);
      object-fit: contain;
      background: #111;
    }
    #status {
      position: absolute;
      left: 20px;
      bottom: 16px;
      z-index: 20;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="bg" id="bg"></div>
    <video class="bg-video" id="bgVideo" autoplay muted loop playsinline style="display:none"></video>
    <div class="shade"></div>
    <svg id="path" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="path-shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-opacity="0.3"></feDropShadow>
        </filter>
      </defs>
      <path id="pathLine" d=""
        fill="none" stroke="#1e3a5f" stroke-width=".35" stroke-dasharray="1.2 .8"
        stroke-linecap="round"></path>
    </svg>
    <div class="title">
      <h1 id="mainTitle">CI Ranking</h1>
      <p id="subTitle">Loading...</p>
    </div>
    <div id="departments"></div>
    <div id="modules"></div>
    <div id="status">正在读取云端数据...</div>
  </div>

  <script>
    (function () {
      var SUPABASE_URL = 'https://ochhwfntlpzwjextvxsh.supabase.co';
      var ANON_KEY = 'sb_publishable_rqJNhAe_muGxtreVFihdUA_Ou5g4S-N';
      var BOARD_ID = 'headquarters-suggestions';
      var CLOUDFLARE_API = 'https://mountain-ranking-api.290205693-845.workers.dev';
      var fallbackBg = 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=80';
      var staticFallbackData = {
        departments: [
          { name: 'OPS,QEHS,HR,GMO', count: 6, unit: 'Ideas', position: { x: 74, y: 36 }, climberImage: '/static-media/icons/contribution.png' },
          { name: 'IE', count: 2, unit: 'Ideas', position: { x: 82, y: 52 }, climberImage: '/static-media/icons/ie.png' },
          { name: 'Procurement', count: 2, unit: 'Ideas', position: { x: 65, y: 64 }, climberImage: '/static-media/icons/procurement.png' },
          { name: 'Sales', count: 2, unit: 'Ideas', position: { x: 46, y: 70 }, climberImage: '/static-media/icons/prototype.png' },
          { name: 'Finance', count: 1, unit: 'Ideas', position: { x: 58, y: 78 }, climberImage: '/static-media/icons/budget.png' },
          { name: 'EC', count: 0, unit: 'Ideas', position: { x: 82, y: 91 }, climberImage: '/static-media/icons/economy.png' }
        ],
        floatModules: [
          { type: 'image', title: '月度公告', contentUrl: '/static-media/posters/monthly-announcement.jpeg', position: { x: 20, y: 210 }, size: { width: 300, height: 424 } },
          { type: 'image', title: '图片公告', contentUrl: '/static-media/posters/eteams-entry.png', position: { x: 20, y: 690 }, size: { width: 300, height: 300 } }
        ],
        theme: {
          mainTitle: '攀登改善高峰，共筑卓越之路',
          subTitle: 'Climb the Peak of Improvement, Forge Excellence Together',
          mainTitleColor: '#17324f',
          subTitleColor: '#17324f',
          backgroundImage: fallbackBg,
          pathColor: '#1e3a5f',
          pathWidth: .35,
          pathStyle: 'dashed',
          labelBgColor: 'rgba(255,255,255,.72)',
          labelBorderColor: 'rgba(255,255,255,.72)',
          labelTextColor: '#1e3a5f',
          floatBgColor: 'rgba(255,255,255,.36)',
          floatBorderColor: 'rgba(255,255,255,.5)'
        }
      };

      function byId(id) {
        return document.getElementById(id);
      }

      function esc(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function setStatus(text) {
        byId('status').innerHTML = esc(text);
      }

      function get(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.setRequestHeader('apikey', ANON_KEY);
        xhr.setRequestHeader('Accept', 'application/json');
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;
          if (xhr.status >= 200 && xhr.status < 300) {
            callback(null, xhr.responseText);
          } else {
            callback(new Error('HTTP ' + xhr.status + ' ' + (xhr.responseText || '')), xhr.responseText);
          }
        };
        xhr.onerror = function () {
          callback(new Error('网络请求失败'), '');
        };
        xhr.send(null);
      }

      function normalizeData(data) {
        data = data || {};
        data.theme = data.theme || {};
        data.departments = data.departments || [];
        data.floatModules = data.floatModules || [];
        return data;
      }

      function numberValue(value, fallback) {
        var n = Number(value);
        return isNaN(n) ? fallback : n;
      }

      function pathD(departments) {
        if (!departments || departments.length < 2) return '';
        var i;
        var d = 'M ' + numberValue(departments[0].position && departments[0].position.x, 0)
          + ' ' + numberValue(departments[0].position && departments[0].position.y, 0);
        for (i = 1; i < departments.length; i++) {
          var prev = departments[i - 1];
          var curr = departments[i];
          var px = numberValue(prev.position && prev.position.x, 0);
          var py = numberValue(prev.position && prev.position.y, 0);
          var cx = numberValue(curr.position && curr.position.x, 0);
          var cy = numberValue(curr.position && curr.position.y, 0);
          var midX = (px + cx) / 2;
          var midY = (py + cy) / 2;
          d += ' Q ' + midX + ' ' + (midY - 2) + ' ' + cx + ' ' + cy;
        }
        return d;
      }

      function pathDash(style) {
        if (style === 'solid' || style === 'arrow') return '';
        if (style === 'dots') return '.2 .6';
        if (style === 'wave') return '.6 .4 .1 .4';
        if (style === 'footprint') return '.3 .9';
        return '1.2 .8';
      }

      function climberHtml(d) {
        if (d.climberImage) {
          return '<span class="climber"><img src="' + esc(d.climberImage) + '" alt=""></span>';
        }
        return '<span class="climber"><svg viewBox="0 0 24 32" fill="currentColor" width="34" height="44"><path d="M12 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm-5 9a2 2 0 0 1 1.8-2h6.4a2 2 0 0 1 1.9 2.6L16 18h-2l-.5-2h-3L10 18H8l-1.1-4.4A2 2 0 0 1 7 11Zm-2 13a1 1 0 0 1-1-1v-5a1 1 0 0 1 2 0v3.2l1.2-1.6 2.6-3.6 1.4 1.4-2 2.6-1.8 2.4.2 1.6H5Zm14 0h-3.6l.2-1.6-1.8-2.4-2-2.6 1.4-1.4 2.6 3.6 1.2 1.6V18a1 1 0 1 1 2 0v5a1 1 0 0 1-1 1Z"></path><path d="M3 28a1 1 0 0 1-.2-1.4l8-10a1 1 0 0 1 1.4.2l.2.2a1 1 0 0 1-.2 1.4l-8 10A1 1 0 0 1 3 28Zm18 0a1 1 0 0 1-.8-1.6l-7-9a1 1 0 1 1 1.4-1.4l7 9A1 1 0 0 1 21 28Z"></path></svg></span>';
      }

      function render(data) {
        data = normalizeData(data);
        var theme = data.theme;
        var departments = data.departments.slice(0);
        var modules = data.floatModules || [];
        var i;

        var bgVideo = byId('bgVideo');
        if (theme.backgroundVideo) {
          byId('bg').style.display = 'none';
          bgVideo.style.display = 'block';
          if (bgVideo.getAttribute('src') !== theme.backgroundVideo) bgVideo.setAttribute('src', theme.backgroundVideo);
          try { bgVideo.play(); } catch (e) {}
        } else {
          bgVideo.style.display = 'none';
          byId('bg').style.display = 'block';
          byId('bg').style.backgroundImage = 'url("' + esc(theme.backgroundImage || fallbackBg) + '")';
        }
        byId('mainTitle').innerHTML = esc(theme.mainTitle || 'CI Ranking');
        byId('subTitle').innerHTML = esc(theme.subTitle || '');
        byId('mainTitle').style.color = theme.mainTitleColor || '#17324f';
        byId('subTitle').style.color = theme.subTitleColor || '#17324f';

        if (!data.isManualMode) {
          departments.sort(function (a, b) {
            return (Number(b.count) || 0) - (Number(a.count) || 0);
          });
        }

        var pathLine = byId('pathLine');
        pathLine.setAttribute('d', pathD(departments));
        pathLine.setAttribute('stroke', theme.pathColor || '#1e3a5f');
        pathLine.setAttribute('stroke-width', String(numberValue(theme.pathWidth, .35)));
        pathLine.setAttribute('stroke-dasharray', pathDash(theme.pathStyle));
        pathLine.setAttribute('filter', 'url(#path-shadow)');

        var deptHtml = '';
        for (i = 0; i < departments.length; i++) {
          var d = departments[i];
          var x = d.position && typeof d.position.x === 'number' ? d.position.x : (20 + i * 10);
          var y = d.position && typeof d.position.y === 'number' ? d.position.y : (25 + i * 9);
          deptHtml += '<div class="dept" style="left:' + x + '%;top:' + y + '%;'
            + 'background-color:' + esc(theme.labelBgColor || 'rgba(255,255,255,.25)') + ';'
            + 'border-color:' + (theme.labelShowBorder === false ? 'transparent' : esc(theme.labelBorderColor || 'rgba(255,255,255,.6)')) + ';'
            + 'color:' + esc(theme.labelTextColor || '#1e3a5f') + ';">'
            + climberHtml(d)
            + '<span class="dept-name">' + esc(d.name) + '</span><span style="opacity:.55">:</span>'
            + '<span class="dept-count">' + esc(d.count) + '<span class="dept-unit">' + esc(d.unit || '件') + '</span></span>'
            + '</div>';
        }
        byId('departments').innerHTML = deptHtml;

        var moduleHtml = '';
        for (i = 0; i < modules.length; i++) {
          var m = modules[i];
          if (!m || !m.contentUrl || m.minimized) continue;
          var left = m.position ? Number(m.position.x) || 0 : 0;
          var top = m.position ? Number(m.position.y) || 0 : 0;
          var width = m.size ? Number(m.size.width) || 280 : 280;
          var height = m.size ? Number(m.size.height) || 180 : 180;
          moduleHtml += '<div class="module" style="left:' + left + 'px;top:' + top + 'px;width:' + width + 'px;height:' + height + 'px;'
            + 'background-color:' + esc(theme.floatBgColor || 'rgba(255,255,255,.75)') + ';'
            + 'border-color:' + esc(theme.floatBorderColor || 'rgba(255,255,255,.6)') + ';">'
            + '<div class="module-title">' + esc(m.title || '') + '</div>';
          if (m.type === 'video') {
            moduleHtml += '<video src="' + esc(m.contentUrl) + '" autoplay muted loop playsinline></video>';
          } else {
            moduleHtml += '<img src="' + esc(m.contentUrl) + '" alt="">';
          }
          moduleHtml += '</div>';
        }
        byId('modules').innerHTML = moduleHtml;
        setStatus('电视兼容版已加载。每 60 秒自动刷新。');
      }

      function load() {
        get(CLOUDFLARE_API + '/api/state', function (cloudErr, cloudText) {
          if (!cloudErr) {
            try {
              var state = JSON.parse(cloudText);
              var saved = state && state.data && state.data.localStorage;
              if (saved) {
                var cloudData = {};
                if (saved.__mountain_ranking_departments) cloudData.departments = JSON.parse(saved.__mountain_ranking_departments);
                if (saved.__mountain_ranking_modules) cloudData.modules = JSON.parse(saved.__mountain_ranking_modules);
                if (saved.__mountain_ranking_theme) cloudData.theme = JSON.parse(saved.__mountain_ranking_theme);
                if (cloudData.departments || cloudData.modules || cloudData.theme) {
                  render(Object.assign({}, staticFallbackData, cloudData));
                  setStatus('已从 Cloudflare 加载。每 60 秒自动刷新。');
                  return;
                }
              }
            } catch (e) {}
          }

        var url = SUPABASE_URL + '/rest/v1/dashboard_pages?select=data&id=eq.headquarters-suggestions&limit=1';
        get(url, function (err, text) {
          if (err) {
            render(staticFallbackData);
            setStatus('云端额度受限，已显示 GitHub 静态图片版本。');
            return;
          }
          try {
            var rows = JSON.parse(text);
            if (!rows || !rows[0] || !rows[0].data) {
              setStatus('云端暂无看板数据，请先在电脑端保存一次。');
              return;
            }
            render(rows[0].data);
          } catch (e) {
            setStatus('数据解析失败：' + e.message);
          }
        });
        });
      }

      load();
      setInterval(load, 60000);
    })();
  </script>
</body>
</html>
